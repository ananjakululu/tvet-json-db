<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // Instant, secure routing based on JWT role
        const userStr = localStorage.getItem('user');
        const token = localStorage.getItem('authToken');

        if (!token || !userStr) {
            window.location.replace('index.html');
        } else {
            const user = JSON.parse(userStr);
            const routes = {
                'admin': 'dashboard.html',
                'hoi': 'dashboard.html',
                'deputy_hoi': 'deputy.html',
                'exam_officer': 'exams.html',
                'teacher': 'teacher.html',
                'parent': 'parent.html'
            };
            // Fallback to login if role is unrecognized
            const destination = routes[user.role] || 'index.html'; 
            window.location.replace(destination);
        }
    </script>
</head>
<body>
    <p style="text-align:center; margin-top:20%; font-family:sans-serif; color:#666;">Routing to your dashboard...</p>
</body>
</html>
